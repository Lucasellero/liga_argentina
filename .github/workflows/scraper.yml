name: Scraper diario

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 ART (UTC-3)
  workflow_dispatch:        # permite ejecutarlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r Scraper/requirements.txt

      - name: Diagnostico (partidos disponibles)
        run: python Scraper/scraper.py --dry-run

      - name: Ejecutar scraper
        run: python Scraper/scraper.py

      - name: Resumen CSV
        run: |
          echo "=== Filas en CSV ==="
          wc -l docs/liga_argentina.csv || echo "CSV no encontrado"
          echo "=== Ultimas 5 lineas ==="
          tail -5 docs/liga_argentina.csv || true

      - name: Commitear CSV actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/liga_argentina.csv
          git diff --cached --quiet || git commit -m "data: actualizar CSV $(date +'%d-%m-%Y')"
          git push
